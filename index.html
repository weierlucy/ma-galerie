<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Au Fil des Saisons</title>
   
       <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            text-align: center;
            font-family: Georgia, 'Georgia, 'Times New Roman', serif;  /* 手写体或衬线字体 */
            font-size: 1.4rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
        }
        
        /* 画廊容器：让图片排成一行 */
        .gallery {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        /* 每一张图片卡片 */
        .card {
            background: white;
            border-radius: 40px;
            padding: 15px;
            width: 200px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 80px;
        }
        
        .card:hover {
            transform: translateY(-10px);
        }
        
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
        }
        
        .card h3 {
            margin: 15px 0 5px;
            color: #333;
        }
        
        .card p {
            color: #666;
            font-size: 14px;
        }
        
        .card a {
            display: inline-block;
            margin-top: 8px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        
        .card a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>Au Fil des Saisons</h1>
    <div class="subtitle">Carnet de jardin,de cuisine et de lumière<br> par Lucy</div>
