<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Au Fil des Saisons</title>
    
    <!-- ============================================================
         1. CSS 样式
         ============================================================ -->
    <style>
        /* ---------- 1.1 全局重置 & 布局 ---------- */
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 40px;
        }

        .gallery {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        /* ---------- 1.2 标题 ---------- */
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .subtitle {
            text-align: center;
            font-family: Georgia, serif;
            font-size: 1.4rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
        }

        /* ---------- 1.3 卡片 ---------- */
        .card {
            background: white;
            border-radius: 40px;
            padding: 15px;
            width: 150px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }

        .card:hover {
            transform: translateY(-10px);
        }

        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
        }

        .card p {
            color: #666;
            font-size: 14px;
        }

        /* ---------- 1.4 图标 ---------- */
        .inline-icon {
            width: 40px;
            vertical-align: middle;
            margin-left: 10px;
            display: inline-block;
            animation: floatAndSpin 4s ease-in-out infinite;
        }
 /* ---------- 1.5 弹窗 ---------- */
.overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.7);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.overlay.active {
    display: flex;
}

.modal {
    background: white;
    border-radius: 30px;
    padding: 30px;
    max-width: 500px;
    width: 90%;
    text-align: center;
    box-shadow: 0 30px 60px rgba(0,0,0,0.3);
    animation: modalIn 0.3s ease-out;
}

.modal img {
    width: 100%;
    max-height: 70vh;   /* 最高不超过屏幕高度的 70% */
    object-fit: contain; /* 关键：让图片完整显示，不裁剪 */
    border-radius: 20px;
    background: #f0f0f0;  /* 留白区域显示浅灰色 */
}
}
.modal p {
    font-size: 1.2rem;
    color: #333;
    margin: 20px 0 0;
    line-height: 1.6;
}

.modal .close-btn {
    margin-top: 20px;
    padding: 10px 30px;
    background: linear-gradient(135deg, #667eea, #764ba2);
    color: white;
    border: none;
    border-radius: 30px;
    font-size: 16px;
    cursor: pointer;
    transition: transform 0.2s;
}

.modal .close-btn:hover {
    transform: scale(1.05);
}

@keyframes modalIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}

        /* ---------- 1.5 动画 ---------- */
        @keyframes floatAndSpin {
            0%   { transform: translateY(0px) rotate(0deg); }
            50%  { transform: translateY(-15px) rotate(10deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }
    </style>
</head>

<body>

    <!-- ============================================================
         2. HTML 内容
         ============================================================ -->
    <h1>Au Fil des Saisons</h1>

    <div class="subtitle">
        Carnet de jardin, de cuisine et de lumière<br>par Lucy
        <img src="icon.png" alt="小图标" class="inline-icon">
    </div>

    <div id="galleryContainer" class="gallery"></div>
<!-- ============================================================
     弹窗
     ============================================================ -->
    <div class="overlay" id="overlay" onclick="closeModalOutside(event)">
    <div class="modal" id="modal">
        <img id="modalImage" src="" alt="">
        <p id="modalDetail"></p>
        <button class="close-btn" onclick="closeModal()">关闭</button>
    </div>
</div>

    <!-- ============================================================
         3. JavaScript
         ============================================================ -->
    <script>
        // ---------- 3.1 数据 ----------
        let photos = [
            { src: "photo1.jpg", alt: "红烧排骨", desc: "28.Mai.2026",detail: "第一次尝试用冰糖炒糖色，火候刚刚好，排骨色泽红亮。"  },
            { src: "photo2.jpg", alt: "Sardins en conserve", desc: "Sardins en conserve",detail: "鱼罐头"  },
            { src: "photo3.jpg", alt: "16.Juin.2026", desc: "16.Juin.2026",detail: "西葫芦炒鸡肉。"  },
            { src: "photo4.jpg", alt: "二十一周年", desc: "二十一周年 18 Juin 2026" ,detail: "继续前行。" },
            { src: "photo5.jpg", alt: "香菜", desc: "18 Juin 2026",detail: "香菜。"  },
            { src: "photo6.jpg", alt: "西葫芦", desc: "17 Juin 2026",detail: "西葫芦。"  },
            { src: "photo7.jpg", alt: "西葫芦", desc: "20 Juin 2026" ,detail: "长势满意。" },
            { src: "photo8.jpg", alt: "西葫芦", desc: "20 Juin 2026",detail: "立体种植。"  },
            { src: "photo9.jpg", alt: "la Mer", desc: "22 Juin 2026",detail: "plage de Pors Carn "  },
            { src: "photo10.jpg", alt: "生日", desc: "22 Juin 2026",detail: "nouilles de Pékin "  }

   ];

       // ---------- 3.2 渲染 ----------
function renderGallery() {
    let html = "";
    for (let i = 0; i < photos.length; i++) {
        let p = photos[i];
        html += `
            <div class="card">
                <img src="${p.src}" alt="${p.alt}" onclick="openModal(${i})" style="cursor:pointer;">
                <p>${p.desc}</p>
            </div>
        `;
    }
    document.getElementById("galleryContainer").innerHTML = html;
}

renderGallery();

// ---------- 3.3 弹窗 ----------
function openModal(index) {
    let p = photos[index];
    document.getElementById("modalImage").src = p.src;
    document.getElementById("modalDetail").textContent = p.detail;
    document.getElementById("overlay").classList.add("active");
    document.body.style.overflow = "hidden"; // 禁止背景滚动
}

function closeModal() {
    document.getElementById("overlay").classList.remove("active");
    document.body.style.overflow = "auto";
}

function closeModalOutside(event) {
    if (event.target === document.getElementById("overlay")) {
        closeModal();
    }
}
    </script>

</body>
</html>
