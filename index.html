<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>记录生活瞬间</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            text-align: center;
            font-size: 2.0rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
        }
        
        /* 画廊容器：让图片排成一行 */
        .gallery {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        /* 每一张图片卡片 */
        .card {
            background: white;
            border-radius: 20px;
            padding: 15px;
            width: 250px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .card:hover {
            transform: translateY(-10px);
        }
        
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
        }
        
        .card h3 {
            margin: 15px 0 5px;
            color: #333;
        }
        
        .card p {
            color: #666;
            font-size: 14px;
        }
        
        .card a {
            display: inline-block;
            margin-top: 10px;
            padding: 8px 20px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            text-decoration: none;
            border-radius: 25px;
            font-size: 14px;
            transition: opacity 0.3s;
        }
        
        .card a:hover {
            opacity: 0.8;
        }
    </style>
</head>
<body>

    <h1>📷 记录生活瞬间</h1>
    <div class="subtitle">午餐类</div>
    
    <div class="gallery">
        
        <!-- 卡片 1 -->
        <div class="card">
            <img src="photo1.jpg
" alt="图片1">
            <h3>照片一</h3>
            <p>这是我喜欢做的红烧排骨。</p>
            <a href="https://photos.app.goo.gl/FdWXZA2UPSojMbtT9">看大图 →</a>
        </div>
        
        <!-- 卡片 2 -->
        <div class="card">
            <img src="photo2.jpg" alt="图片2">
            <h3>照片二</h3>
            <p>青菜配炸酥肉 </p>
            <a href="https://photos.app.goo.gl/g2uxLnp4tsa2W97T6" target="_blank">看大图 →</a>
        </div>
        
              <!-- 卡片 3 -->
        <div class="card">
            <img src="photo3.jpg" alt="图片3">
            <h3>照片三</h3>
            <p>西葫芦炒鸡肉</p>
            <a href="https://photos.app.goo.gl/aSmwzWeURHvk2P3g9">看大图 →</a>
        </div>
        
    </div>

</body>
</html>
