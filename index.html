<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Au Fil des Saisons</title>
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: 'Segoe UI', Arial, sans-serif;
            padding: 40px;
        }
        
        h1 {
            text-align: center;
            color: white;
            font-size: 2.5rem;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }
        
        .subtitle {
            text-align: center;
            font-family: Georgia, serif;
            font-size: 1.4rem;
            color: rgba(255,255,255,0.8);
            margin-bottom: 40px;
        }
        
        .gallery {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .card {
            background:white;
            border-radius: 40px;
            padding: 15px;
            width: 150px;
            text-align: center;
            transition: transform 0.3s;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 40px;
        }
        
        .card:hover {
            transform: translateY(-10px);
        }
        
        .card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 15px;
        }
        
        .card p {
            color: #666;
            font-size: 14px;
}

       /* 默认：电脑 */
.floating-icon {
    position: fixed;
    bottom: 410px;
    right: 620px;
    width: 80px;
    animation: float 4s ease-in-out infinite;
    z-index: 999;
}

/* 手机屏幕（宽度小于 768px） */
@media (max-width: 768px) {
    .floating-icon {
        bottom: 20px;    /* 手机：靠近底部 */
        right: 20px;     /* 手机：靠近右侧 */
        width: 50px;     /* 手机：小一点 */
    }
}        

      /* 1. 定义动画：名字叫 "float" */
@keyframes float {
    0%   { transform: translateY(0px) rotate(0deg); }
    50%  { transform: translateY(-10px) rotate(10deg); }
    100% { transform: translateY(0px) rotate(0deg); }
}

/* 2. 图标样式 + 动画 */
.floating-icon {
    width: 60px;              /* 图标宽度 */
    height: auto;             /* 高度自动 */
    animation: float 3s ease-in-out infinite;
    display: block;
    margin: 0 auto;           /* 居中 */
}


    </style>
</head>
<body>

    <h1>Au Fil des Saisons</h1>
    <div class="subtitle">Carnet de jardin, de cuisine et de lumière<br>par Lucy</div>
    
    <!-- 容器：JavaScript 会把卡片生成到这里 -->
    <div id="galleryContainer" class="gallery"></div>
    <img src="icon.png" alt="小图标" class="floating-icon">

    <!-- ========== JavaScript 从这里开始 ========== -->
    <script>
        // 图片数组
        let photos = [
            { src: "photo1.jpg", alt: "红烧排骨", desc: "28.Mai.2026" },
            { src: "photo2.jpg", alt: "Sardins en conserve", desc: "Sardins en conserve" },
            { src: "photo3.jpg", alt: "16.Juin.2026", desc: "16.Juin.2026" },
            { src: "photo4.jpg", alt: "二十一周年", desc: "二十一周年 18 Juin 2026" },
            { src: "photo5.jpg", alt: "香菜", desc: "18 Juin 2026" },
            { src: "photo6.jpg", alt: "西葫芦", desc: "17 Juin 2026" },
            { src: "photo7.jpg", alt: "西葫芦", desc: "20 Juin 2026" },
            { src: "photo8.jpg", alt: "西葫芦", desc: "20 Juin 2026" }



     
         
           
        ];

     
     
        // 用循环生成所有卡片
        function renderGallery() {
            let html = "";
            for (let i = 0; i < photos.length; i++) {
                let p = photos[i];
                html = html + `
                    <div class="card">
                        <a href="${p.src}" target="_blank">
                            <img src="${p.src}" alt="${p.alt}">
                        </a>
                        <p>${p.desc}</p>
                    </div>
                `;
            }
            document.getElementById("galleryContainer").innerHTML = html;
        }
                       
        // 页面加载时自动生成
        renderGallery();
    </script>
    
</body>
</html>
